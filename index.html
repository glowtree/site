document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

wtree.com\" class=\"gt-link\" style=\"color:#9aa39c; text-decoration:none;\">info@glowtree.com<\u002Fa>\n    <\u002Fnav><\u002Fheader>\n\n  <!-- Hero -->\n  <section style=\"position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:120px 24px 80px; text-align:center;\">\n\n    <h1 style=\"margin:0; font-family:'Comfortaa',cursive; font-size:clamp(58px,13vw,150px); font-weight:600; letter-spacing:-0.02em; line-height:1; color:#f2f6f2; white-space:nowrap;\">glow<span id=\"treeStage\" style=\"display: inline-block; position: relative; width: 134px; height: 282px; vertical-align: -0.12em; margin: 0 -0.02em; margin-left: -0.03px; margin-right: -0.03px; left: 6px; top: -5px\"><\u002Fspan>ree<\u002Fh1>\n\n    <div style=\"margin-top:28px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; line-height:1.9; letter-spacing:0.02em; color:#8b948d; max-width:620px; text-align:center; text-wrap:balance;\">{{ servicesLine }}<\u002Fdiv>\n\n    <div style=\"margin-top:44px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#5c655e; display:flex; align-items:center; gap:8px;\">\n      <span style=\"width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);\"><\u002Fspan>\n      click the tree\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- About -->\n  <section id=\"about\" style=\"max-width:720px; margin:0 auto; padding:60px 32px 40px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:24px;\">about<\u002Fdiv>\n    <p style=\"margin:0; font-size:clamp(22px,3.4vw,30px); font-weight:400; line-height:1.5; letter-spacing:-0.01em; color:#dfe6df; text-wrap:pretty;\">glowtree makes software for video game, film, and visualization applications.&nbsp; It's creator&nbsp;has over 20 years of industry experience, both as an engineer and artist.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- What we do -->\n  <section style=\"max-width:720px; margin:0 auto; padding:40px 32px 100px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:24px;\">what we do<\u002Fdiv>\n    <ul style=\"margin:0; padding:0; list-style:none; display:flex; flex-direction:column;\">\n      <sc-for list=\"{{ servicesNum }}\" as=\"s\" hint-placeholder-count=\"5\">\n        <li style=\"display:flex; align-items:baseline; gap:18px; padding:18px 0; border-top:1px solid rgba(255,255,255,0.07); font-size:19px; color:#e2e8e2;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#5c655e; width:28px; flex-shrink:0;\">{{ s.num }}<\u002Fspan>\n          <span>{{ s.label }}<\u002Fspan>\n        <\u002Fli>\n      <\u002Fsc-for>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <!-- Footer -->\n  <footer style=\"border-top:1px solid rgba(255,255,255,0.07); padding:36px 40px; display:flex; flex-direction:column; gap:20px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:#6b746d;\">\n    <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);\"><\u002Fspan>\n        <span style=\"font-family:'Comfortaa',cursive; font-weight:600; color:#9aa39c;\">glowtree<\u002Fspan>\n        <span>· Toronto, Canada<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"letter-spacing:0.04em; color:#565f58;\">© 2011–2026 glowtree™ · all rights reserved<\u002Fdiv><a href=\"mailto:info@glowtree.com\" class=\"gt-link\" style=\"color:#9aa39c; text-decoration:none;\">info@glowtree.com<\u002Fa>\n    <\u002Fdiv>\n    \n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;treeColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#00fff9&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#57e389&quot;,&quot;#00fff9&quot;,&quot;#ffcf5c&quot;,&quot;#e9efe9&quot;],&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      servicesLine: \"DCC tools for Unreal, Unity, Maya & Blender  ·  full-stack websites  ·  cross-platform standalone applications  ·  consulting\",\n      services: [\n        \"DCC tools for Unreal, Unity, Maya & Blender\",\n        \"full-stack websites\",\n        \"cross-platform standalone applications\",\n        \"consulting\",\n      ],\n      servicesNum: [\n        { num: \"01\", label: \"DCC tools for Unreal, Unity, Maya and Blender\" },\n        { num: \"02\", label: \"full-stack websites\" },\n        { num: \"03\", label: \"cross-platform standalone applications\" },\n        { num: \"04\", label: \"consulting\" },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    this._mountTree();\n  }\n\n  componentDidUpdate() {\n    if (this._tree) this._tree.setColor(this.props.treeColor || \"#57e389\");\n  }\n\n  _mountTree() {\n    const color = this.props.treeColor || \"#57e389\";\n    document.documentElement.style.setProperty(\"--accent\", color);\n    let tries = 0;\n    const go = () => {\n      const stage = document.getElementById(\"treeStage\");\n      if (window.GlowTree && stage) {\n        stage.innerHTML = \"\";\n        const bloom = document.createElement(\"div\");\n        bloom.style.cssText = \"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:820px; height:820px; max-width:220vw; border-radius:50%; z-index:0; pointer-events:none; background:radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent) 0%, color-mix(in srgb, var(--accent) 6%, transparent) 38%, transparent 68%);\";\n        stage.appendChild(bloom);\n        this._tree = window.GlowTree.make(stage, { color, lineWidth: 6 });\n        this._tree.svg.style.zIndex = \"1\";\n        return;\n      }\n      if (tries++ < 120) requestAnimationFrame(go);\n    };\n    go();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
